<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Page not found · G Pen University</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" href="/assets/img/gpen-g-black.png" />
  <!-- Self-contained on purpose: a 404 must render even if the app bundle is the
       thing that failed, so no dependency on styles.css or the version loader. -->
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; }
    html, body { margin: 0; background: #faf9f5; }
    body { min-height: 100vh; display: grid; place-items: center; padding: 40px 24px;
      color: #111; font-family: Archivo, system-ui, -apple-system, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased; line-height: 1.5; text-align: center; }
    .wrap { max-width: 32rem; }
    img { width: 46px; height: 46px; object-fit: contain; margin: 0 auto 20px; display: block; }
    .eyebrow { font-size: 12px; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; color: #c8952f; }
    h1 { font-size: clamp(26px, 6vw, 38px); font-weight: 900; letter-spacing: -.02em; line-height: 1.1; margin: 8px 0 10px; }
    p { color: #6e6e66; font-size: 15.5px; margin: 0 0 24px; }
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 14px 26px; border-radius: 999px;
      background: #111; color: #fff; text-decoration: none; font-weight: 800; font-size: 15px; }
    .btn:hover { background: #c8952f; color: #1a1509; }
    .help { margin-top: 26px; font-size: 13px; color: #6e6e66; }
    .help a { color: #c8952f; }
  </style>
</head>
<body>
  <div class="wrap">
    <img src="/assets/img/gpen-g-black.png" alt="G Pen" />
    <span class="eyebrow">G Pen University</span>
    <h1>That page isn't on the shelf.</h1>
    <p>The link may be old or mistyped. Everything lives on the main page —
       the five product courses, your Binder, and your certificates.</p>
    <a class="btn" href="/">Back to G Pen University →</a>
    <p class="help">Still stuck? Email <a href="mailto:help@gpen.com">help@gpen.com</a>
       or call <a href="tel:+18336913224">+1 833-691-3224</a>.</p>
  </div>
</body>
</html>
