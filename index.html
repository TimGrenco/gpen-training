  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- The two origins that serve most of the page weight: product shots and the
       lifestyle photography. Warming the connections early saves a DNS+TLS
       round trip each on a phone. -->
  <link rel="preconnect" href="https://cdn.shopify.com" crossorigin />
  <link rel="preconnect" href="https://assets.gpen.com" crossorigin />
  <!-- Loaded async: as a plain stylesheet this sat AHEAD of the critical CSS
       below and made first paint wait on a third-party origin, which is exactly
       what the critical CSS exists to prevent. The inline styles declare a
       system-ui fallback and the font URL carries display=swap, so text paints
       immediately and swaps to Archivo when it arrives. -->
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&display=swap"
        onload="this.onload=null;this.rel='stylesheet'" />
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&display=swap" /></noscript>
  <!-- Critical CSS. The stylesheet and all three scripts are injected only after
       fetch("version.json") resolves, so without this the first thing a rep on
       LTE sees is unstyled white. Do NOT add a second static <link> to
       styles.css — the loader's copy carries a ?v= query and it would download
       the whole stylesheet twice. -->
  <style>
    :root { color-scheme: light; }
    html, body { margin: 0; background: #faf9f5; }
    body { color: #111; font-family: Archivo, system-ui, -apple-system, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased; }
    .boot { min-height: 70vh; display: grid; place-items: center; gap: 14px; padding: 40px 20px; text-align: center; }
    /* With JS off the skeleton can never be replaced, so it would sit there
       spinning above the "JavaScript is required" notice. Hide it in that case
       — the <noscript> block is the whole message. */
    .no-js .boot { display: none; }
    .boot img { width: 40px; height: 40px; object-fit: contain; animation: bootpulse 1.4s ease-in-out infinite; }
    .boot p { margin: 0; font-size: 13px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: #6e6e66; }
    @keyframes bootpulse { 0%,100% { opacity: .35; } 50% { opacity: 1; } }
    @media (prefers-reduced-motion: reduce) { .boot img { animation: none; opacity: .7; } }
    .noscript { max-width: 30rem; margin: 12vh auto; padding: 0 24px; text-align: center; line-height: 1.6; }
  </style>
  <!-- Runtime loader: fetches the current build version and loads the CSS/JS
       tagged with it, so a new deploy shows up WITHOUT a hard refresh. Open tabs
       auto-reload when a newer version ships (never mid-quiz). version.json is
       stamped automatically on every push by .github/workflows/stamp-version.yml. -->
  <script>document.documentElement.classList.remove("no-js");</script>
  <script>
    (function () {
      var CSS = "assets/css/styles.css";
      var JS = ["assets/js/config.js", "assets/js/data.js", "assets/js/app.js"];
      var current = null, loaded = false;

      function inject(v) {
        current = v;
        var q = v ? "?v=" + encodeURIComponent(v) : "";
        var link = document.createElement("link");
        link.rel = "stylesheet"; link.href = CSS + q;
        document.head.appendChild(link);
        JS.forEach(function (src) {
          var s = document.createElement("script");
          s.src = src + q; s.async = false; // keep config -> data -> app order
          document.head.appendChild(s);
        });
      }
      function getVersion() {
        return fetch("version.json?t=" + Date.now(), { cache: "no-store" })
          .then(function (r) { return r.ok ? r.json() : null; })
          .then(function (d) { return d && d.version ? String(d.version) : null; })
          .catch(function () { return null; });
      }
      function check() {
        getVersion().then(function (v) {
          if (!v) return;
          // Adopt the build after a fallback boot rather than reloading — on the
          // slow connections that trigger the fallback, reloading risks a loop.
          if (!current) { current = v; return; }
          if (v !== current && !document.querySelector(".quiz")) location.reload();
        });
      }
      function startPolling() {
        setInterval(check, 120000);
        document.addEventListener("visibilitychange", function () { if (!document.hidden) check(); });
      }
      // Never let a slow/missing version.json block the app from loading.
      // 800ms, not 2500: past this the rep is just staring at a skeleton, and
      // loading unversioned assets is a far better outcome than a blank page.
      var t = setTimeout(function () { if (!loaded) { loaded = true; inject(null); } }, 800);
      getVersion().then(function (v) {
        // The fallback must not cost this tab its update channel: if it already
        // booted unversioned, still record the build so the NEXT deploy reloads.
        if (!loaded) { loaded = true; clearTimeout(t); inject(v); }
        else if (v) { current = v; }
        startPolling();
      });
    }());
  </script>
</head>
<body>
  <!-- Skeleton shown until route() replaces #app. No teardown needed: every
       render assigns app.innerHTML, which discards this wholesale. -->
  <div id="app">
    <div class="boot">
      <img src="assets/img/gpen-g-black.png" alt="G Pen" />
      <p>Loading G Pen University…</p>
    </div>
  </div>
  <noscript>

      <p>G Pen University needs JavaScript to run the courses and quizzes. Please
      enable it, or open this page in a different browser.</p>
      <p>Stuck? Email <a href="mailto:help@gpen.com">help@gpen.com</a> or call
      <a href="tel:+18336913224">+1 833-691-3224</a> and we'll help you out.</p>
    </div>
  </noscript>
</body>
</html>
